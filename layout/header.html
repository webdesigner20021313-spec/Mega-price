<header class="header">

  <!-- Search -->
  <div class="header-search">
    <span class="header-search-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input class="header-search-input" type="text" placeholder="Поиск по разделам..." id="global-search" autocomplete="off" />
  </div>

  <!-- Right side -->
  <div class="header-right">

    <!-- Language -->
    <button class="header-lang" onclick="toggleLang(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="lang-label">RU</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <div class="header-sep"></div>

    <!-- Notifications -->
    <button class="header-icon-btn" title="Уведомления">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge"></span>
    </button>

    <div class="header-sep"></div>

    <!-- User avatar + dropdown -->
    <div class="header-user">
      <button class="header-avatar-btn" onclick="toggleUserDropdown()">
        <div class="header-avatar" id="user-avatar">
          <!-- Инициалы пользователя, заменится на фото -->
          АД
        </div>
        <span class="header-user-name" id="user-name">Администратор</span>
      </button>

      <!-- Dropdown -->
      <div class="user-dropdown" id="user-dropdown">
        <div class="user-dropdown-header">
          <div class="user-dropdown-name" id="dropdown-name">Администратор</div>
          <div class="user-dropdown-email" id="dropdown-email">admin@megaprice.kz</div>
        </div>
        <div class="user-dropdown-menu">
          <a href="#" class="user-dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Мой профиль
          </a>
          <a href="#" class="user-dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Настройки аккаунта
          </a>
          <div class="user-dropdown-sep"></div>
          <button class="user-dropdown-item danger" onclick="handleLogout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Выйти
          </button>
        </div>
      </div>
    </div>

  </div>
</header>

<script>
  // User dropdown
  function toggleUserDropdown() {
    document.getElementById('user-dropdown').classList.toggle('open');
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    const userMenu = document.querySelector('.header-user');
    if (userMenu && !userMenu.contains(e.target)) {
      const dd = document.getElementById('user-dropdown');
      if (dd) dd.classList.remove('open');
    }
  });

  // Language toggle
  const langs = ['RU', 'KZ', 'EN'];
  let langIndex = 0;
  function toggleLang(btn) {
    langIndex = (langIndex + 1) % langs.length;
    document.getElementById('lang-label').textContent = langs[langIndex];
  }

  function handleLogout() {
    if (confirm('Выйти из аккаунта?')) {
      window.location.href = '/login.html';
    }
  }
</script>
