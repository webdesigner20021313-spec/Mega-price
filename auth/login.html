<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Войти — MegaPrice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font: 'Inter', -apple-system, sans-serif;
      --white:      #FFFFFF;
      --black:      #111111;
      --gray-50:    #F9FAFB;
      --gray-100:   #F3F4F6;
      --gray-200:   #E5E7EB;
      --gray-300:   #D1D5DB;
      --gray-400:   #9CA3AF;
      --gray-500:   #6B7280;
      --gray-800:   #1F2937;
      --gray-900:   #111827;
      --blue-500:   #3B82F6;
      --blue-600:   #2563EB;
      --blue-700:   #1D4ED8;
      --red-600:    #DC2626;
      --red-100:    #FEE2E2;
      --border:     var(--gray-200);
      --text-primary:   var(--gray-900);
      --text-secondary: var(--gray-500);
      --text-muted:     var(--gray-400);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --tr: 150ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      font-size: 0.875rem;
      color: var(--text-primary);
      background: var(--gray-50);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .auth-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Logo */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .auth-logo-mark {
      width: 40px; height: 40px;
      background: var(--black);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-mark svg { width: 20px; height: 20px; color: var(--white); }
    .auth-logo-name {
      font-size: 1.25rem; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.02em;
    }

    /* Card */
    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .auth-head { display: flex; flex-direction: column; gap: 4px; }
    .auth-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
    .auth-desc  { font-size: 0.875rem; color: var(--text-secondary); }

    /* Fields */
    .field { display: flex; flex-direction: column; gap: 0.375rem; }
    .field-label { font-size: 0.875rem; font-weight: 500; color: var(--text-primary); }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input {
      width: 100%; height: 2.5rem;
      padding: 0 0.75rem 0 2.25rem;
      font-family: var(--font); font-size: 0.875rem; color: var(--text-primary);
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-sm); outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .input::placeholder { color: var(--text-muted); }
    .input:hover { border-color: var(--gray-400); }
    .input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .input.no-icon { padding-left: 0.75rem; }
    .input.is-error { border-color: var(--red-600); }
    .input.is-error:focus { box-shadow: 0 0 0 3px rgba(220,38,38,.12); }

    .input-icon {
      position: absolute; left: 0.625rem;
      display: flex; align-items: center;
      color: var(--text-muted); pointer-events: none;
    }
    .input-icon svg { width: 1rem; height: 1rem; }

    .input-eye {
      position: absolute; right: 0.625rem;
      display: flex; align-items: center;
      color: var(--text-muted); cursor: pointer;
      transition: color var(--tr);
    }
    .input-eye:hover { color: var(--text-primary); }
    .input-eye svg { width: 1rem; height: 1rem; }
    .input.has-eye { padding-right: 2.25rem; }

    .field-row { display: flex; align-items: center; justify-content: space-between; }
    .field-link {
      font-size: 0.75rem; font-weight: 500; color: var(--blue-600);
      text-decoration: none; transition: color var(--tr);
    }
    .field-link:hover { color: var(--blue-700); }

    /* Error message */
    .error-msg {
      display: none;
      background: var(--red-100); border: 1px solid #FECACA;
      border-radius: var(--radius-sm); padding: 0.625rem 0.75rem;
      font-size: 0.8125rem; color: var(--red-600);
      align-items: center; gap: 0.5rem;
    }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 1rem; height: 1rem; flex-shrink: 0; }

    /* Remember */
    .check-row { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
    .check-row input { width: 1rem; height: 1rem; accent-color: var(--black); cursor: pointer; }
    .check-row span { font-size: 0.875rem; color: var(--text-secondary); }

    /* Button */
    .btn-submit {
      width: 100%; height: 2.5rem;
      background: var(--black); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: background var(--tr);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-submit:hover { background: var(--gray-800); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-submit svg { width: 1rem; height: 1rem; }

    /* Spinner */
    .spinner {
      display: none; width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .auth-div {
      display: flex; align-items: center; gap: 0.75rem;
      color: var(--text-muted); font-size: 0.75rem;
    }
    .auth-div::before, .auth-div::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Footer */
    .auth-footer {
      text-align: center;
      font-size: 0.875rem; color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--blue-600); font-weight: 500; text-decoration: none;
      transition: color var(--tr);
    }
    .auth-footer a:hover { color: var(--blue-700); }

    .auth-terms {
      text-align: center; font-size: 0.75rem; color: var(--text-muted);
      line-height: 1.5;
    }
    .auth-terms a { color: var(--text-muted); text-decoration: underline; }
    .auth-terms a:hover { color: var(--text-primary); }
  </style>
</head>
<body>

<div class="auth-wrap">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <span class="auth-logo-name">MegaPrice</span>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <div class="auth-head">
      <div class="auth-title">Войти в аккаунт</div>
      <div class="auth-desc">Введите логин и пароль для входа</div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-text">Неверный логин или пароль</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div style="display:flex;flex-direction:column;gap:1rem">

        <!-- Login -->
        <div class="field">
          <div class="field-label">Логин</div>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="login" class="input" type="text" placeholder="Введите логин" autocomplete="username" />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <div class="field-row">
            <div class="field-label">Пароль</div>
            <a href="#" class="field-link">Забыли пароль?</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="password" class="input has-eye" type="password" placeholder="Введите пароль" autocomplete="current-password" />
            <span class="input-eye" onclick="togglePwd()">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- Remember -->
        <label class="check-row">
          <input type="checkbox" id="remember" />
          <span>Запомнить меня</span>
        </label>

        <!-- Submit -->
        <button class="btn-submit" type="submit" id="submit-btn">
          <span id="btn-text">Войти</span>
          <div class="spinner" id="spinner"></div>
        </button>

      </div>
    </form>

    <div class="auth-div">или</div>

    <div class="auth-footer">
      Нет аккаунта? <a href="register.html">Оставить заявку</a>
    </div>

  </div>

  <div class="auth-terms">
    Нажимая «Войти», вы соглашаетесь с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a>
  </div>

</div>

<script>
  function togglePwd() {
    var inp = document.getElementById('password');
    var ico = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      ico.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    var login    = document.getElementById('login').value.trim();
    var password = document.getElementById('password').value;
    var errBox   = document.getElementById('error-msg');
    var errText  = document.getElementById('error-text');
    var btn      = document.getElementById('submit-btn');
    var spinner  = document.getElementById('spinner');
    var btnText  = document.getElementById('btn-text');

    errBox.classList.remove('show');
    document.getElementById('login').classList.remove('is-error');
    document.getElementById('password').classList.remove('is-error');

    if (!login) {
      errText.textContent = 'Введите логин';
      errBox.classList.add('show');
      document.getElementById('login').classList.add('is-error');
      return;
    }
    if (!password) {
      errText.textContent = 'Введите пароль';
      errBox.classList.add('show');
      document.getElementById('password').classList.add('is-error');
      return;
    }

    // Показать загрузку
    btn.disabled = true;
    btnText.textContent = 'Входим...';
    spinner.style.display = 'block';

    // Имитация запроса
    setTimeout(function() {
      // Демо: admin / admin
      if (login === 'admin' && password === 'admin') {
        window.location.href = '../layout/preview.html';
      } else {
        btn.disabled = false;
        btnText.textContent = 'Войти';
        spinner.style.display = 'none';
        errText.textContent = 'Неверный логин или пароль';
        errBox.classList.add('show');
        document.getElementById('login').classList.add('is-error');
        document.getElementById('password').classList.add('is-error');
      }
    }, 800);
  }
</script>

</body>
</html>
